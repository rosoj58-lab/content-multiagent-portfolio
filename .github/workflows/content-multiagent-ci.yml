name: Content MultiAgent CI

on:
  push:
    paths:
      - "Content_MultiAgent/**"
      - ".github/workflows/content-multiagent-ci.yml"
  pull_request:
    paths:
      - "Content_MultiAgent/**"
      - ".github/workflows/content-multiagent-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Ruff and pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Content_MultiAgent

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
