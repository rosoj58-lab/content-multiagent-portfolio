services:
  app:
    build:
      context: ./Content_MultiAgent
      dockerfile: Dockerfile
    image: content-multiagent:dev
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      - ./Content_MultiAgent:/app
      - ./bmad-output:/bmad-output
      - content-multiagent-uv-cache:/root/.cache/uv
    env_file:
      - path: ./Content_MultiAgent/.env
        required: false
    environment:
      BMAD_OUTPUT_DIR: /bmad-output
      PYTHONUNBUFFERED: "1"
    command: >
      sh -lc '
        if [ -f pyproject.toml ]; then
          if [ -f uv.lock ]; then uv sync --frozen; else uv sync; fi;
        fi;
        if [ -f app.py ]; then
          uv run streamlit run app.py --server.address=0.0.0.0 --server.port=8501;
        elif [ -f src/seo_content_pipeline/app.py ]; then
          uv run streamlit run src/seo_content_pipeline/app.py --server.address=0.0.0.0 --server.port=8501;
        else
          echo "Project scaffold is ready. Add the Streamlit app, then run docker compose up --build.";
          sleep infinity;
        fi
      '

volumes:
  content-multiagent-uv-cache:
