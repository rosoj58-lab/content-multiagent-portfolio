services:
  app:
    build:
      context: ./Content_MultiAgent
      dockerfile: Dockerfile
    image: content-multiagent:dev
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      - ./Content_MultiAgent:/app
      - ./bmad-output:/bmad-output
      - content-multiagent-uv-cache:/root/.cache/uv
    env_file:
      - path: ./Content_MultiAgent/.env
        required: false
    environment:
      BMAD_OUTPUT_DIR: /bmad-output
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
    command: >
      sh -lc '
        uv sync --frozen;
        uv run streamlit run app.py --server.address=0.0.0.0 --server.port=8501;
      '

volumes:
  content-multiagent-uv-cache:
